name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-deps-and-syntax:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Syntax check backend JS
        run: |
          node --check src/index.js
          node --check src/db.js
          node --check src/redis.js
          node --check src/auth/jwt.js
          node --check src/auth/middleware.js
          node --check src/routes/auth.js
          node --check src/routes/todos.js
          node --check src/routes/payment.js
          node --check src/utils/email.js

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: todo-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: todo-frontend:ci
