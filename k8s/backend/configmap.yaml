apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: todo-app
data:
  PORT: "3001"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  GITHUB_CALLBACK_URL: "https://YOUR_DOMAIN/auth/github/callback"
  FRONTEND_URL: "https://YOUR_DOMAIN"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  EMAIL_FROM: "TodoApp <noreply@YOUR_DOMAIN>"
  # SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY come from secrets.yaml (not here)
