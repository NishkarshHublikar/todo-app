apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: todo-app
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: YOUR_REGISTRY/todo-frontend:latest
          imagePullPolicy: IfNotPresent
          # Replace with your actual image, e.g. docker.io/youruser/todo-frontend:latest
          ports:
            - containerPort: 8080
          env:
            # Leave API_URL blank in Kubernetes so the frontend uses relative paths
            # and backend traffic is routed through ingress/service rules.
            - name: API_URL
              value: "/api"
              # For direct service exposure, use your backend's external IP/domain
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: RAZORPAY_KEY_ID
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: frontend
