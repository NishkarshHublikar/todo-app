apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: todo-app
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 32080
  type: NodePort
  # Self-hosted/clusters without a cloud load balancer should use NodePort.
  # Access frontend locally via http://127.0.0.1:32080
